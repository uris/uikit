name: Deploy Slice UIKit Site

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM over SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null || true

            if [ -d ~/projects/uikit/.git ]; then
              cd ~/projects/uikit
              git config pull.rebase false
              GIT_SSH_COMMAND='ssh -i ~/.ssh/github_actions -o StrictHostKeyChecking=no' git pull origin main
            else
              rm -rf ~/projects/uikit
              GIT_SSH_COMMAND='ssh -i ~/.ssh/github_actions -o StrictHostKeyChecking=no' git clone git@github.com:uris/uikit.git ~/projects/uikit
            fi

            cd ~/projects/uikit
            docker-compose up -d --build uikit
            docker image prune -f
